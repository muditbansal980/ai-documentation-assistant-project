services:
  postgres:
    image: postgres:17

    container_name: aidocumentassistant-postgres

    restart: unless-stopped

    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

    ports:
      - "5436:5432"

    volumes:
      - ./data:/var/lib/postgresql/data

    networks:
      - aidocumentassistant-network

networks:
  aidocumentassistant-network:
    driver: bridge